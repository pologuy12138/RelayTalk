version: "3.9"

# ============================================================
# Full deployment: Node.js service + Nginx reverse proxy + Let's Encrypt.
# Suitable for a NAS or VPS with a public domain.
#
# 使用方式：
#   1. 将 nginx.conf 中的 DOMAIN 替换为你的域名
#   2. 修改 app 服务里的 TURN_* 环境变量
#   3. 先执行 README 中的 certbot certonly 命令申请证书
#   4. docker compose up -d --build
# ============================================================

services:
  app:
    build: .
    container_name: relaytalk-app
    restart: unless-stopped
    environment:
      PORT: "3050"
      MAX_PEERS: "2"
      TURN_URLS: "turn:your-turn-domain.example.com:3478?transport=tcp"
      TURN_USERNAME: "replace-me"
      TURN_CREDENTIAL: "replace-me"
      ICE_TRANSPORT_POLICY: "relay"
      VIDEO_WIDTH: "1920"
      VIDEO_HEIGHT: "1080"
      VIDEO_FPS: "24"
      VIDEO_MAX_BITRATE: "8000000"
      VIDEO_START_BITRATE: "5000000"
      VIDEO_MIN_BITRATE: "3000000"
      VIDEO_DEGRADATION: "maintain-resolution"
      VIDEO_PREFER_CODEC: "H264"
      VIDEO_STRICT: "true"
    expose:
      - "3050"
    networks:
      - vc-net

  nginx:
    image: nginx:alpine
    container_name: relaytalk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8444:8444"             # HTTPS 端口（可自行修改）
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - vc-net

  certbot:
    image: certbot/certbot
    container_name: relaytalk-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  vc-net:
    driver: bridge
