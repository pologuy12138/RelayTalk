<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RelayTalk</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#fff;height:100vh}
.container{max-width:1200px;margin:0 auto;padding:16px;height:100vh;display:flex;flex-direction:column}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 0;flex-shrink:0}
.header h1{font-size:18px;font-weight:600}
#netStats{font-size:13px;color:#aaa;font-family:monospace}
#bar{text-align:center;padding:6px;font-size:13px;border-radius:8px;margin-bottom:4px;flex-shrink:0}
#bar.waiting{background:#2a2a3e;color:#aaa}
#bar.ok{background:#1a3a2e;color:#44ff44}
#bar.busy{background:#3a3a5e;color:#ffcc00}
#bar.err{background:#3a1a2e;color:#ff6666}
#err{color:#e94560;font-size:12px;text-align:center;padding:4px;display:none}
#aDbg{font-size:11px;color:#888;text-align:center;flex-shrink:0;line-height:1.5}
.grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px;min-height:0;padding:8px 0}
.box{position:relative;background:#16213e;border-radius:12px;overflow:hidden}
.box video{width:100%;height:100%;object-fit:cover;display:block;background:#111827}
.box .lbl{position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,.6);padding:4px 10px;border-radius:6px;font-size:13px}
.box .ph{color:#555;font-size:14px;padding:20px;text-align:center;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#localVideo{transform:scaleX(-1)}
.controls{display:flex;justify-content:center;gap:16px;padding:16px 0;flex-shrink:0}
.controls button{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;font-size:20px;background:#16213e;color:#fff}
.controls button:hover{background:#0f3460}
.controls button.off,.controls button.hangup:hover{background:#e94560}
.controls button.hangup{background:#e94560;width:56px;height:56px}
@media(max-width:600px){.grid{grid-template-columns:1fr;grid-template-rows:1fr 1fr}}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>RelayTalk</h1><span id="netStats">⬆ -- ⬇ -- KB/s</span></div>
<div id="bar" class="waiting">启动中...</div>
<div id="err"></div>
<div id="aDbg"></div>
<div class="grid">
<div class="box"><video id="localVideo" autoplay muted playsinline></video><div class="lbl">我</div></div>
<div class="box">
<video id="remoteVideo" autoplay playsinline></video>
<div class="ph" id="ph">等待对方加入...</div>
<div class="lbl">对方</div>
</div>
</div>
<div class="controls">
<button id="btnMic">🎤</button>
<button id="btnCam">📹</button>
<button class="hangup" id="btnHangup">📞</button>
</div>
</div>
<script>
const $=id=>document.getElementById(id);
const LV=$('localVideo'), RV=$('remoteVideo'), PH=$('ph');
let log=m=>console.log('RelayTalk:',m);
let bar=(t,txt)=>{$('bar').className=t;$('bar').textContent=txt};
let err=m=>{$('err').style.display='block';$('err').textContent='❌ '+m};

let ws, localStream, remoteStream, pc=null, remoteId=null, havePeer=false;
let mediaPromise=null, pendingCandidates=[];
let makingOffer=false, connected=false;
let statsTimer=null, lastSent=0, lastRecv=0, appConfig=null, ICE_CONFIG=null;
let avMetrics='';
let lastVideoFrames={out:null,in:null};
const DEFAULT_VIDEO={width:1280,height:720,frameRate:18,maxBitrate:3000000,startBitrate:1800000,minBitrate:800000,degradationPreference:'maintain-resolution',preferCodec:'H264'};
const DEFAULT_AUDIO={maxBitrate:64000};

async function loadConfig(){
  if(appConfig) return appConfig;
  const res=await fetch('/config.json',{cache:'no-store'});
  if(!res.ok) throw new Error('config load failed: '+res.status);
  appConfig=await res.json();
  ICE_CONFIG=appConfig.iceConfig;
  return appConfig;
}

function videoConfig(){
  return Object.assign({},DEFAULT_VIDEO,(appConfig&&appConfig.video)||{});
}

function audioConfig(){
  return Object.assign({},DEFAULT_AUDIO,(appConfig&&appConfig.audio)||{});
}

async function ensureMedia(){
  if(localStream) return localStream;
  if(mediaPromise) return mediaPromise;
  mediaPromise=(async()=>{
    bar('busy','获取摄像头和麦克风...');
    try{
      const vc=videoConfig();
      localStream=await navigator.mediaDevices.getUserMedia({
        video:{width:{ideal:vc.width},height:{ideal:vc.height},frameRate:{ideal:vc.frameRate}},
        audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}
      });
      for(const track of localStream.getVideoTracks()){
        try{track.contentHint='detail'}catch(e){}
      }
      LV.srcObject=localStream;
      bar('waiting','已就绪');
      updateDebug();
      return localStream;
    }catch(e){
      mediaPromise=null;
      err('摄像头/麦克风不可用: '+e.message);
      throw e;
    }
  })();
  return mediaPromise;
}

function createPC(){
  closePC();
  if(!ICE_CONFIG) throw new Error('ICE_CONFIG 未加载');
  remoteStream=new MediaStream();
  RV.srcObject=remoteStream;
  pc=new RTCPeerConnection(ICE_CONFIG);

  pc.onicecandidate=e=>{
    if(e.candidate && ws && ws.readyState===WebSocket.OPEN && remoteId){
      sendSignal('wr-can', e.candidate);
    }
  };

  pc.ontrack=e=>{
    PH.style.display='none';
    for(const track of e.streams[0].getTracks()){
      if(!remoteStream.getTracks().some(t=>t.id===track.id)) remoteStream.addTrack(track);
    }
    RV.play().catch(ex=>log('remote play blocked: '+ex.message));
    updateDebug();
  };

  pc.onconnectionstatechange=()=>{
    const s=pc.connectionState;
    connected=(s==='connected'||s==='completed');
    if(connected){bar('ok','已连接');startStats()}
    if(s==='failed'){bar('err','WebRTC连接失败');retrySoon()}
    if(s==='disconnected'){bar('busy','连接中断，重试中');retrySoon()}
    updateDebug();
  };
  pc.oniceconnectionstatechange=()=>updateDebug();
  pc.onicegatheringstatechange=()=>updateDebug();
  pc.onsignalingstatechange=()=>updateDebug();

  for(const track of localStream.getTracks()){
    const sender=pc.addTrack(track, localStream);
    preferCodec(sender, track);
    tuneSender(sender, track);
  }
  updateDebug();
}

function preferCodec(sender, track){
  if(track.kind!=='video') return;
  const vc=videoConfig();
  if(!vc.preferCodec || typeof RTCRtpSender==='undefined' || !RTCRtpSender.getCapabilities) return;
  try{
    const transceiver=pc.getTransceivers().find(t=>t.sender===sender);
    if(!transceiver || !transceiver.setCodecPreferences) return;
    const caps=RTCRtpSender.getCapabilities('video');
    if(!caps || !caps.codecs) return;
    const preferred=String(vc.preferCodec).toLowerCase();
    const first=caps.codecs.filter(c=>c.mimeType&&c.mimeType.toLowerCase()===`video/${preferred}`);
    if(!first.length) return;
    const rest=caps.codecs.filter(c=>!(c.mimeType&&c.mimeType.toLowerCase()===`video/${preferred}`));
    transceiver.setCodecPreferences(first.concat(rest));
  }catch(e){log('codec preference skipped: '+e.message)}
}

function tuneSender(sender, track){
  try{
    const params=sender.getParameters();
    if(!params.encodings || !params.encodings.length) params.encodings=[{}];
    if(track.kind==='video'){
      const vc=videoConfig();
      params.encodings[0].maxBitrate=vc.maxBitrate;
      params.encodings[0].maxFramerate=vc.frameRate;
      params.encodings[0].scaleResolutionDownBy=1;
      params.degradationPreference=vc.degradationPreference;
    }else if(track.kind==='audio'){
      params.encodings[0].maxBitrate=audioConfig().maxBitrate;
    }
    sender.setParameters(params).catch(e=>log('setParameters failed: '+e.message));
  }catch(e){log('tuneSender skipped: '+e.message)}
}

function tuneDescription(desc){
  if(!desc || !desc.sdp) return desc;
  const vc=videoConfig();
  let sdp=desc.sdp;
  sdp=setMediaBandwidth(sdp,'video',Math.round(vc.maxBitrate/1000));
  sdp=setVideoCodecBitrates(sdp,vc);
  return {type:desc.type,sdp};
}

function setMediaBandwidth(sdp, media, maxKbps){
  const lines=sdp.split('\r\n');
  const mLine=lines.findIndex(l=>l.startsWith(`m=${media}`));
  if(mLine<0) return sdp;
  for(let i=mLine+1;i<lines.length && !lines[i].startsWith('m=');){
    if(lines[i].startsWith('b=AS:')||lines[i].startsWith('b=TIAS:')) lines.splice(i,1);
    else i++;
  }
  let insertAt=mLine+1;
  for(let i=mLine+1;i<lines.length && !lines[i].startsWith('m=');i++){
    if(lines[i].startsWith('c=')) insertAt=i+1;
  }
  lines.splice(insertAt,0,`b=AS:${maxKbps}`,`b=TIAS:${maxKbps*1000}`);
  return lines.join('\r\n');
}

function setVideoCodecBitrates(sdp, vc){
  const lines=sdp.split('\r\n');
  const min=Math.round(vc.minBitrate/1000);
  const start=Math.round(vc.startBitrate/1000);
  const max=Math.round(vc.maxBitrate/1000);
  const pts=[];
  lines.forEach(line=>{
    const m=line.match(/^a=rtpmap:(\d+) (VP8|VP9|H264|AV1)\//i);
    if(m) pts.push(m[1]);
  });
  for(const pt of pts){
    const fmtpPrefix=`a=fmtp:${pt} `;
    const params=[`x-google-min-bitrate=${min}`,`x-google-start-bitrate=${start}`,`x-google-max-bitrate=${max}`];
    const fmtpIndex=lines.findIndex(l=>l.startsWith(fmtpPrefix));
    if(fmtpIndex>=0){
      const existing=lines[fmtpIndex].slice(fmtpPrefix.length).split(';').map(p=>p.trim()).filter(Boolean)
        .filter(p=>!/^x-google-(min|start|max)-bitrate=/i.test(p));
      lines[fmtpIndex]=fmtpPrefix+existing.concat(params).join(';');
    }else{
      const rtpIndex=lines.findIndex(l=>l.startsWith(`a=rtpmap:${pt} `));
      if(rtpIndex>=0) lines.splice(rtpIndex+1,0,fmtpPrefix+params.join(';'));
    }
  }
  return lines.join('\r\n');
}

function closePC(){
  stopStats();
  if(pc){try{pc.close()}catch(e){}}
  pc=null; connected=false; makingOffer=false; pendingCandidates=[];
  if(remoteStream){for(const t of remoteStream.getTracks()) t.stop()}
  remoteStream=null; RV.srcObject=null; PH.style.display='block';
  updateDebug();
}

function sendSignal(type,data){
  if(ws && ws.readyState===WebSocket.OPEN && remoteId){
    ws.send(JSON.stringify({to:remoteId,type,data}));
  }
}

async function startCall(){
  if(pc || !remoteId) return;
  await ensureMedia();
  createPC();
  try{
    makingOffer=true;
    await pc.setLocalDescription(tuneDescription(await pc.createOffer()));
    sendSignal('wr-offer', pc.localDescription);
    bar('busy','offer sent');
    updateDebug();
  }catch(e){err('创建 offer 失败: '+e.message);closePC()}
  finally{makingOffer=false}
}

async function handleOffer(from,sdp){
  remoteId=from;
  await ensureMedia();
  if(!pc) createPC();
  try{
    await pc.setRemoteDescription(new RTCSessionDescription(sdp));
    await flushPendingCandidates();
    await pc.setLocalDescription(tuneDescription(await pc.createAnswer()));
    sendSignal('wr-answer', pc.localDescription);
    bar('busy','answer sent');
    updateDebug();
  }catch(e){err('处理 offer 失败: '+e.message);closePC()}
}

async function handleAnswer(sdp){
  if(!pc) return;
  try{
    await pc.setRemoteDescription(new RTCSessionDescription(sdp));
    await flushPendingCandidates();
    updateDebug();
  }catch(e){err('处理 answer 失败: '+e.message)}
}

async function handleCandidate(c){
  const candidate=new RTCIceCandidate(c);
  if(!pc || !pc.remoteDescription){pendingCandidates.push(candidate);return}
  try{await pc.addIceCandidate(candidate)}catch(e){log('ICE err: '+e.message)}
}

async function flushPendingCandidates(){
  if(!pc || !pc.remoteDescription || !pendingCandidates.length) return;
  const queue=pendingCandidates.splice(0);
  for(const c of queue){try{await pc.addIceCandidate(c)}catch(e){log('queued ICE err: '+e.message)}}
}

function retrySoon(){
  if(!remoteId) return;
  setTimeout(()=>{if(remoteId && !pc) startCall()},3000);
}

function connect(){
  bar('busy','连接服务器...');
  ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host);
  ws.onopen=()=>{log('WS OK');ensureMedia().catch(()=>{})};
  ws.onclose=()=>{closePC();bar('err','服务器断开');setTimeout(connect,3000)};
  ws.onmessage=async e=>{
    try{
      const m=JSON.parse(e.data);
      switch(m.type){
        case 'init':
          havePeer=m.peers.length>0;
          if(havePeer){remoteId=m.peers[0];bar('ok','对方已在线');startCall()}
          else bar('waiting','等待对方加入...');
          break;
        case 'peer-joined':
          if(!havePeer){havePeer=true;remoteId=m.peerId;bar('ok','对方已加入，等待连接...')}
          break;
        case 'wr-offer': await handleOffer(m.from,m.data); break;
        case 'wr-answer': await handleAnswer(m.data); break;
        case 'wr-can': await handleCandidate(m.data); break;
        case 'peer-left': case 'hangup':
          havePeer=false;remoteId=null;closePC();bar('waiting',m.type==='hangup'?'对方已挂断':'等待对方加入...');
          break;
        case 'room-full': err('聊天室已满（最多2人）');bar('err','聊天室已满');break;
      }
    }catch(ex){err('消息错误: '+ex.message)}
  };
}

function startStats(){
  if(statsTimer || !pc) return;
  statsTimer=setInterval(async()=>{
    if(!pc) return;
    const stats=await pc.getStats();
    let sent=0, recv=0;
    let outVideo='', inVideo='', sourceVideo='', quality='';
    const vTrack=localStream&&localStream.getVideoTracks()[0];
    if(vTrack&&vTrack.getSettings){
      const s=vTrack.getSettings();
      if(s.width&&s.height) sourceVideo=`CAM:${s.width}x${s.height}${s.frameRate?`@${Math.round(s.frameRate)}`:''}`;
    }
    stats.forEach(r=>{
      if(r.type==='outbound-rtp' && !r.isRemote) sent+=r.bytesSent||0;
      if(r.type==='inbound-rtp' && !r.isRemote) recv+=r.bytesReceived||0;
      if(r.type==='outbound-rtp' && !r.isRemote && (r.kind==='video'||r.mediaType==='video')){
        const w=r.frameWidth||0, h=r.frameHeight||0;
        const fps=calcVideoFps('out',r.id,r.framesEncoded||r.framesSent||0,r.timestamp,r.framesPerSecond);
        if(w&&h) outVideo=`TX:${w}x${h}${fps?`@${fps}`:''}`;
        if(r.qualityLimitationReason) quality=`Q:${r.qualityLimitationReason}`;
      }
      if(r.type==='inbound-rtp' && !r.isRemote && (r.kind==='video'||r.mediaType==='video')){
        const w=r.frameWidth||0, h=r.frameHeight||0;
        const fps=calcVideoFps('in',r.id,r.framesDecoded||r.framesReceived||0,r.timestamp,r.framesPerSecond);
        if(w&&h) inVideo=`RX:${w}x${h}${fps?`@${fps}`:''}`;
      }
    });
    $('netStats').textContent=`⬆ ${((sent-lastSent)/1024).toFixed(1)} ⬇ ${((recv-lastRecv)/1024).toFixed(1)} KB/s`;
    lastSent=sent; lastRecv=recv;
    avMetrics=[sourceVideo,outVideo,inVideo,quality].filter(Boolean).join(' | ');
    updateDebug();
  },1000);
}
function calcVideoFps(kind,id,frames,timestamp,fallback){
  const prev=lastVideoFrames[kind];
  let fps=Number(fallback||0);
  if(prev&&prev.id===id&&timestamp>prev.timestamp&&frames>=prev.frames){
    fps=(frames-prev.frames)*1000/(timestamp-prev.timestamp);
  }
  lastVideoFrames[kind]={id,frames,timestamp};
  return fps>0?Math.round(fps):0;
}
function stopStats(){if(statsTimer){clearInterval(statsTimer);statsTimer=null}lastSent=0;lastRecv=0;lastVideoFrames={out:null,in:null};avMetrics='';$('netStats').textContent='⬆ -- ⬇ -- KB/s'}

function updateDebug(){
  const info=$('aDbg');
  if(!info) return;
  info.textContent='AV:'+(connected?'✅':'⏳')+
    ' | PC:'+(pc?pc.connectionState:'null')+
    ' | ICE:'+(pc?pc.iceConnectionState:'-')+
    ' | SIG:'+(pc?pc.signalingState:'-')+
    (avMetrics?' | '+avMetrics:'');
}

let micOn=true, camOn=true;
$('btnMic').onclick=function(){micOn=!micOn;if(localStream)localStream.getAudioTracks().forEach(t=>t.enabled=micOn);this.className=micOn?'':'off';this.textContent=micOn?'🎤':'🔇'};
$('btnCam').onclick=function(){camOn=!camOn;if(localStream)localStream.getVideoTracks().forEach(t=>t.enabled=camOn);this.className=camOn?'':'off';this.textContent=camOn?'📹':'🚫'};
$('btnHangup').onclick=function(){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'hangup'}));remoteId=null;havePeer=false;closePC();bar('waiting','已挂断')};

document.addEventListener('click',()=>{if(RV.srcObject)RV.play().catch(()=>{})},{once:false});
async function init(){
  try{
    await loadConfig();
    connect();
  }catch(e){
    err('配置加载失败: '+e.message);
    bar('err','配置加载失败');
  }
}
init();
</script>
</body>
</html>
